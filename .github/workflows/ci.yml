name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build & Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Tooling versions
        run: |
          xcodebuild -version
          swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
